schemaVersion: 1.0.0
name: "My package"
alertingRules:
  - name: "Rule1"
    description: "My test alerting rule"
    eventClass: ExecutionEndedEvent
    conditions:
      - BindingCondition:
          description: "condition 1"
          bindingKey: "myKey"
          negate: false
          predicate:
            BindingValueEqualsPredicate:
              value: "myValue"
plans: []
fragments:
  - "keywords.yml"
  - "plans/*.yml"
  - "schedules.yml"
  - "parameters.yml"
  - "parameters2.yml"
  - "unknown.yml"
